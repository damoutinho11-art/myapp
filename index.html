<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <meta name="color-scheme" content="dark light" />
  <meta name="description" content="Breakthrough 65 — athlete command center for dunk training, performance cut, recovery, and deep work." />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; manifest-src 'self'; worker-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" />
  <title>Breakthrough 65 — Athlete OS</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon-192.png" sizes="192x192" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <a class="skip-link" href="#app">Skip to app</a>

  <div id="installBanner" class="install-banner" hidden>
    <div>
      <strong>Install Athlete OS</strong>
      <span>Offline check-ins, training, meals, and progress.</span>
    </div>
    <button id="installButton" type="button">Install</button>
  </div>

  <div id="updateBanner" class="install-banner update-banner" hidden>
    <div>
      <strong>Update available</strong>
      <span>Reload to activate the newest Athlete OS.</span>
    </div>
    <button id="reloadButton" type="button">Reload</button>
  </div>

  <header class="topbar" aria-label="App identity">
    <div class="brand-mark" aria-hidden="true">65</div>
    <div>
      <p class="kicker">Breakthrough Protocol</p>
      <h1>Diogo Athlete OS</h1>
    </div>
    <div id="todayBadge" class="today-badge" aria-live="polite">Day --</div>
  </header>

  <main id="app" class="app-shell" tabindex="-1">
    <section id="panel-today" class="panel is-active" aria-labelledby="tab-today"></section>
    <section id="panel-training" class="panel" aria-labelledby="tab-training"></section>
    <section id="panel-meals" class="panel" aria-labelledby="tab-meals"></section>
    <section id="panel-recovery" class="panel" aria-labelledby="tab-recovery"></section>
    <section id="panel-mind" class="panel" aria-labelledby="tab-mind"></section>
    <section id="panel-progress" class="panel" aria-labelledby="tab-progress"></section>
    <section id="panel-safety" class="panel" aria-labelledby="tab-safety"></section>
  </main>

  <nav id="navBar" class="bottom-nav" aria-label="Main sections"></nav>

  <noscript>
    <div class="noscript">This app needs JavaScript to save check-ins and render the protocol.</div>
  </noscript>

  <script src="app.js" defer></script>
</body>
</html>
